<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Boreal Explainer 48s</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #071311;
      }

      body {
        font-family: "Space Grotesk", sans-serif;
      }

      [data-composition-id="boreal-index"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #071311;
      }

      .clip {
        position: absolute;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <div
      data-composition-id="boreal-index"
      data-start="0"
      data-duration="48"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="boreal-explainer"
        class="clip"
        data-composition-id="boreal-launch-explainer"
        data-composition-src="compositions/boreal-launch-explainer.html"
        data-start="0"
        data-duration="48"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        window.__timelines["boreal-index"] = gsap.timeline({ paused: true });
      </script>
    </div>
  </body>
</html>
